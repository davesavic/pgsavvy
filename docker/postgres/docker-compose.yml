services:
  postgres:
    image: postgres:17-alpine
    container_name: pgsavvy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pgsavvy
      POSTGRES_PASSWORD: pgsavvy
      POSTGRES_DB: pgsavvy_test
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgsavvy -d pgsavvy_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
