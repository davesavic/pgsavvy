version: "2"

linters:
  default: none
  enable:
    - depguard
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    depguard:
      rules:
        models:
          files:
            - '**/pkg/models/**'
          deny:
            - pkg: github.com/davesavic/pgsavvy/pkg/gui
              desc: pkg/models must not depend on the gui layer (Appendix A)
            - pkg: github.com/davesavic/pgsavvy/pkg/drivers
              desc: pkg/models must not depend on the drivers layer (Appendix A)
            - pkg: github.com/davesavic/pgsavvy/pkg/session
              desc: pkg/models must not depend on the session layer (Appendix A)
            - pkg: github.com/davesavic/pgsavvy/pkg/query
              desc: pkg/models must not depend on the query layer (Appendix A)
        drivers-root:
          files:
            - '**/pkg/drivers/*.go'
          deny:
            - pkg: github.com/jackc/pgx
              desc: pkg/drivers root must stay engine-neutral (epic pgsavvy-921 D9); pgx imports belong in pkg/drivers/pg.
            - pkg: github.com/jackc/pgconn
              desc: pkg/drivers root must stay engine-neutral (epic pgsavvy-921 D9); pgconn imports belong in pkg/drivers/pg.
            - pkg: github.com/davesavic/pgsavvy/pkg/drivers/pg
              desc: pkg/drivers root must not depend on a concrete driver implementation (epic pgsavvy-921 D9).
        drivers-all:
          files:
            - '**/pkg/drivers/**'
          deny:
            - pkg: github.com/jesseduffield/lazygit
              desc: pkg/drivers/** must not depend on the gui/tui layer (epic pgsavvy-enn T0); lazygit (pkg/gocui) imports belong in pkg/gui/** + main.go.
        gui-context:
          files:
            - '**/pkg/gui/context/**'
          deny:
            - pkg: github.com/davesavic/pgsavvy/pkg/gui/controllers
              desc: pkg/gui/context/** must not depend on pkg/gui/controllers (epic pgsavvy-fow D7); the controllers->context direction stays allowed.

formatters:
  enable:
    - gofumpt
    - goimports
