# Taskfile for dbsavvy (go-task v3).
# Install go-task: go install github.com/go-task/task/v3/cmd/task@latest
# Install golangci-lint v2: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.7.0
version: '3'

vars:
  PG_COMPOSE: docker/postgres/docker-compose.yml
  PG_DSN: '{{.DBSAVVY_TEST_PG | default "postgres://dbsavvy:dbsavvy@localhost:5432/dbsavvy_test"}}'
  SSH_COMPOSE: docker/sshtunnel/docker-compose.yml
  SSH_KEY: docker/sshtunnel/.keys/id_ed25519

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build dbsavvy binary into bin/dbsavvy with -ldflags-injected version metadata.
    cmds:
      - go build -ldflags "-X main.version=dev -X main.buildSource=task" -o bin/dbsavvy .

  test:
    desc: Run unit tests across all packages (forwards extra args, e.g. `task test -- -run TestX`).
    cmds:
      - go test {{.CLI_ARGS | default "./..."}}

  pg:up:
    desc: Bring up the docker/postgres fixture and wait until it reports healthy.
    cmds:
      - docker compose -f {{.PG_COMPOSE}} up -d --wait
      - 'echo "postgres up. export DBSAVVY_TEST_PG={{.PG_DSN}}"'

  pg:down:
    desc: Tear down the docker/postgres fixture (removes the container and volume).
    cmds:
      - docker compose -f {{.PG_COMPOSE}} down -v

  sshtunnel:up:
    desc: Bring up the SSH bastion + private Postgres fixture (ephemeral keypair, generated if missing).
    cmds:
      - mkdir -p docker/sshtunnel/.keys
      - test -f {{.SSH_KEY}} || ssh-keygen -t ed25519 -N "" -f {{.SSH_KEY}}
      - cp {{.SSH_KEY}}.pub docker/sshtunnel/authorized_keys
      - docker compose -f {{.SSH_COMPOSE}} up -d --build --wait
      - 'echo "ssh tunnel fixture up. Export the following before running the integration tests:"'
      - 'echo "  export DBSAVVY_TEST_SSH_BASTION=localhost:2222"'
      - 'echo "  export DBSAVVY_TEST_SSH_KEY=$(pwd)/{{.SSH_KEY}}"'

  sshtunnel:down:
    desc: Tear down the SSH bastion + private Postgres fixture (removes containers and volumes).
    cmds:
      - docker compose -f {{.SSH_COMPOSE}} down -v

  test:integration:
    desc: Run integration tests against a live Postgres (requires DBSAVVY_TEST_PG + docker fixture).
    preconditions:
      - sh: '[ -n "$DBSAVVY_TEST_PG" ]'
        msg: |
          DBSAVVY_TEST_PG is not set; refusing to run integration tests silently.
          Bring the fixture up and export the DSN, e.g.:
            task pg:up
            export DBSAVVY_TEST_PG=postgres://dbsavvy:dbsavvy@localhost:5432/dbsavvy_test
            task test:integration
      - sh: 'go run ./internal/pgprobe "$DBSAVVY_TEST_PG"'
        msg: |
          DBSAVVY_TEST_PG is set but the database is unreachable.
          Start the fixture with `task pg:up`, then retry.
    cmds:
      - env GOFLAGS=-count=1 go test -tags=integration ./...

  test:all:
    desc: Run unit + integration tests.
    cmds:
      - task: test
      - task: test:integration

  lint:
    desc: Run golangci-lint v2 (5 linters; see .golangci.yml).
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format Go files via golangci-lint v2 formatters (gofumpt + goimports).
    cmds:
      - golangci-lint fmt

  generate:
    desc: Run code generation (stub until E12 wires JSON-schema generation).
    cmds:
      - 'echo "generate: not yet wired (see E12)"'

  vulncheck:
    desc: Install (pinned) and run govulncheck across the module (D-DEPS1).
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - govulncheck ./...

  release:
    desc: Cut a release (stub until release pipeline lands).
    cmds:
      - 'echo "release: not yet wired"'
