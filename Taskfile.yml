# Taskfile for pgsavvy (go-task v3).
# Install go-task: go install github.com/go-task/task/v3/cmd/task@latest
# Install golangci-lint v2: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.7.0
version: '3'

vars:
  PG_COMPOSE: docker/postgres/docker-compose.yml
  PG_DSN: '{{.PGSAVVY_TEST_PG | default "postgres://pgsavvy:pgsavvy@localhost:5432/pgsavvy_test"}}'
  SSH_COMPOSE: docker/sshtunnel/docker-compose.yml
  SSH_KEY: docker/sshtunnel/.keys/id_ed25519

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build pgsavvy binary into bin/pgsavvy with -ldflags-injected version metadata.
    cmds:
      - go build -ldflags "-X main.version=dev -X main.buildSource=task" -o bin/pgsavvy .

  test:
    desc: Run unit tests across all packages (forwards extra args, e.g. `task test -- -run TestX`).
    cmds:
      - go test {{.CLI_ARGS | default "./..."}}

  pg:up:
    desc: Bring up the docker/postgres fixture and wait until it reports healthy.
    cmds:
      - docker compose -f {{.PG_COMPOSE}} up -d --wait
      - 'echo "postgres up. export PGSAVVY_TEST_PG={{.PG_DSN}}"'

  pg:down:
    desc: Tear down the docker/postgres fixture (removes the container and volume).
    cmds:
      - docker compose -f {{.PG_COMPOSE}} down -v

  sshtunnel:up:
    desc: Bring up the SSH bastion + private Postgres fixture (ephemeral keypair, generated if missing).
    cmds:
      - mkdir -p docker/sshtunnel/.keys
      - test -f {{.SSH_KEY}} || ssh-keygen -t ed25519 -N "" -f {{.SSH_KEY}}
      - cp {{.SSH_KEY}}.pub docker/sshtunnel/authorized_keys
      - docker compose -f {{.SSH_COMPOSE}} up -d --build --wait
      - 'echo "ssh tunnel fixture up. Export the following before running the integration tests:"'
      - 'echo "  export PGSAVVY_TEST_SSH_BASTION=localhost:2222"'
      - 'echo "  export PGSAVVY_TEST_SSH_KEY=$(pwd)/{{.SSH_KEY}}"'

  sshtunnel:down:
    desc: Tear down the SSH bastion + private Postgres fixture (removes containers and volumes).
    cmds:
      - docker compose -f {{.SSH_COMPOSE}} down -v

  test:integration:
    desc: Run integration tests against a live Postgres (requires PGSAVVY_TEST_PG + docker fixture).
    preconditions:
      - sh: '[ -n "$PGSAVVY_TEST_PG" ]'
        msg: |
          PGSAVVY_TEST_PG is not set; refusing to run integration tests silently.
          Bring the fixture up and export the DSN, e.g.:
            task pg:up
            export PGSAVVY_TEST_PG=postgres://pgsavvy:pgsavvy@localhost:5432/pgsavvy_test
            task test:integration
      - sh: 'go run ./internal/pgprobe "$PGSAVVY_TEST_PG"'
        msg: |
          PGSAVVY_TEST_PG is set but the database is unreachable.
          Start the fixture with `task pg:up`, then retry.
    cmds:
      - env GOFLAGS=-count=1 go test -tags=integration ./...

  test:all:
    desc: Run unit + integration tests.
    cmds:
      - task: test
      - task: test:integration

  lint:
    desc: Run golangci-lint v2 (5 linters; see .golangci.yml).
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format Go files via golangci-lint v2 formatters (gofumpt + goimports).
    cmds:
      - golangci-lint fmt

  generate:
    desc: Run code generation (stub until E12 wires JSON-schema generation).
    cmds:
      - 'echo "generate: not yet wired (see E12)"'

  vulncheck:
    desc: Install (pinned) and run govulncheck across the module (D-DEPS1).
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - govulncheck ./...

  release:
    desc: Cut a release (stub until release pipeline lands).
    cmds:
      - 'echo "release: not yet wired"'

  demo:
    desc: Record the pgsavvy demo GIFs (docs/demo*.gif) via VHS against the docker fixture.
    deps: [build]
    env:
      XDG_CONFIG_HOME: '{{.ROOT_DIR}}/.demo/config'
      XDG_STATE_HOME: '{{.ROOT_DIR}}/.demo/state'
    preconditions:
      - sh: '[ "$(docker inspect -f ''{{`{{.State.Health.Status}}`}}'' pgsavvy-postgres 2>/dev/null)" = "healthy" ]'
        msg: 'docker fixture not healthy; run `task pg:up` first.'
      - sh: 'command -v vhs >/dev/null 2>&1'
        msg: 'vhs not found on PATH; install github.com/charmbracelet/vhs.'
    cmds:
      - |
        set -eu
        cfg="$XDG_CONFIG_HOME/pgsavvy"
        mkdir -p "$cfg"
        cat > "$cfg/connections.yml" <<'YAML'
        connections:
          - name: demo
            driver: postgres
            dsn: postgres://pgsavvy@localhost:5432/pgsavvy_test?sslmode=disable
            password_command: echo pgsavvy
        YAML
        # Record one tape from pristine state. pgsavvy persists the editor
        # buffer under $XDG_STATE_HOME, which would otherwise be restored and
        # re-typed by the tape (duplicating the query), so wipe it each run.
        # $2 toggles completion auto-trigger: off for deterministic typing,
        # on for the autocomplete showcase.
        record() {
          rm -rf "$XDG_STATE_HOME/pgsavvy"
          mkdir -p "$XDG_STATE_HOME/pgsavvy"
          printf 'editor:\n  autocomplete: %s\n' "$2" > "$cfg/config.yml"
          vhs "$1"
        }
        record docs/demo.tape false
        record docs/demo-autocomplete.tape true
        record docs/demo-relationships.tape false
