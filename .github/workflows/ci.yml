name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.0

      - run: task build
      - run: task test
      - run: task lint
      - run: task vulncheck

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pgsavvy
          POSTGRES_PASSWORD: pgsavvy
          POSTGRES_DB: pgsavvy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for postgres
        run: until pg_isready -h localhost -U pgsavvy; do sleep 1; done
        timeout-minutes: 2

      - name: Apply fixture
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=pgsavvy psql -h localhost -U pgsavvy -d pgsavvy_test -f docker/postgres/init/01_fixture.sql

      - name: Run integration tests
        env:
          PGSAVVY_TEST_PG: 'postgres://pgsavvy:pgsavvy@localhost:5432/pgsavvy_test?sslmode=disable'
        run: task test:integration
